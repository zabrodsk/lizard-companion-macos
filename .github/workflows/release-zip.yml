name: Build ZIP Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-zip:
    runs-on: macos-latest
    env:
      SIGN_IDENTITY: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_DEVELOPER_ID_APP_CERT_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_APP_CERT_BASE64 }}
      APPLE_DEVELOPER_ID_APP_CERT_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_APP_CERT_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Import Developer ID certificate
        run: ./scripts/setup-signing-keychain.sh

      - name: Build ZIP
        run: |
          ./scripts/release-local.sh
          ls -la dist

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LizardCompanion-macOS
          path: |
            dist/LizardCompanion-macOS.zip
            dist/LizardCompanion-macOS.zip.sha256

      - name: Publish GitHub Release Asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/LizardCompanion-macOS.zip
            dist/LizardCompanion-macOS.zip.sha256
          generate_release_notes: true
